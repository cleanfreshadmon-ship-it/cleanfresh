<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trabaja con Nosotros | Clean & Fresh S.A.S</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
      body { font-family: 'Inter', sans-serif; }
  </style>
  <link rel="icon" type="image/png" href="logo.png">

<link rel="apple-touch-icon" href="logo.png">
  
</head>

<body class="bg-slate-50">

<nav class="flex items-center justify-between px-8 py-6 max-w-7xl mx-auto relative">
    <a href="index" class="text-2xl font-bold text-blue-600">CLEAN<span class="text-gray-500">FRESH</span></a>
    
    <button id="menu-btn" class="md:hidden text-2xl text-slate-600 focus:outline-none">
        <i class="fas fa-bars"></i>
    </button>

    <div id="menu" class="hidden absolute top-20 left-0 w-full bg-white shadow-xl p-8 flex-col space-y-4 md:static md:shadow-none md:p-0 md:w-auto md:flex md:flex-row md:space-y-0 md:space-x-8 font-medium z-50">
        <a href="index" class="hover:text-blue-600 transition border-b md:border-none pb-2 md:pb-0">Inicio</a>
        <a href="nosotros" class="hover:text-blue-600 transition border-b md:border-none pb-2 md:pb-0">Nosotros</a>
		<a href="servicios" class="hover:text-blue-600 transition">Servicios</a>
        <a href="contactanos" class="hover:text-blue-600 transition">Contacto</a>
        <a href="https://wa.me/573150240704" class="md:hidden bg-blue-600 text-white px-6 py-3 rounded-full text-center font-bold">Cotizar Ahora</a>
    </div>
</nav>
<main class="max-w-4xl mx-auto py-16 px-8">
    <div class="text-center mb-12">
        <h1 class="text-4xl font-extrabold text-slate-900 mb-4">Únete a nuestro equipo</h1>
        <p class="text-lg text-slate-600">Buscamos personas comprometidas para brindar el mejor servicio en Armenia y el Quindío.</p>
    </div>

    <section class="bg-white p-8 md:p-12 rounded-3xl shadow-xl border border-slate-100">
        <form action="https://formspree.io/f/xojprwqp" method="POST" enctype="multipart/form-data" class="space-y-6">
            
            <div class="grid md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Nombre Completo</label>
                    <input type="text" name="nombre" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Correo Electrónico</label>
                    <input type="email" name="email" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Teléfono de contacto</label>
                <input type="tel" name="telefono" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Cargo al que aspira</label>
                <select name="cargo" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
                    <option>Operario de Aseo</option>
                    <option>Jardinero</option>
                    <option>Mantenimiento de Fachadas</option>
                    <option>Administrativo</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Adjuntar Hoja de Vida (PDF o Word)</label>
                <div class="relative border-2 border-dashed border-slate-200 rounded-xl p-8 text-center hover:border-blue-400 transition">
                    <input type="file" name="hoja_de_vida" required class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                    <div class="text-slate-500">
                        <i class="fas fa-cloud-upload-alt text-3xl mb-2 text-blue-500"></i>
                        <p>Haz clic para subir o arrastra tu archivo aquí</p>
                    </div>
                </div>
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 shadow-lg transition">
                Enviar Candidatura
            </button>
        </form>
    </section>
</main>

<footer class="py-12 text-center text-slate-400 text-sm">
    <p>© 2026 Clean & Fresh S.A.S · Armenia, Quindío</p>
</footer>

</body>
</html>
